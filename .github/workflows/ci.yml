name: SentinelSOL CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Verify Go Extractor
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.3'
        cache: true

    - name: Verify Dependencies
      run: go mod verify

    - name: Build Daemon
      run: go build -v ./cmd/sentinelsol/...

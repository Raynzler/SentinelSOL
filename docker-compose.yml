services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerts.rules.yml:/etc/prometheus/alerts.rules.yml
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=colosseum
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning
  extractor:
    build: .
    container_name: sentinelsol_daemon
    ports:
        - "8080:8080"
        # Wait for Prometheus to start before the Go app starts
    depends_on:
        - prometheus
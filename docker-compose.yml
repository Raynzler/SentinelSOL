services:
  # 1. Your Go Daemon (The App)
  extractor:
    build: .
    ports:
      - "8080:8080" # Metrics
      - "6060:6060" # pprof
    environment:
      - RPC_URL=${RPC_URL}
    depends_on:
      prometheus:
        condition: service_healthy

  # 2. The Observability Stack
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerts.rules.yml:/etc/prometheus/alerts.rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # Change host port if already bound locally (e.g., "8080:9090")
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:latest
    env_file:
      - .env
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--config.expand-env'
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100" # Change host port if already bound locally (e.g., "3101:3100")
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/promtail-config.yml:/etc/promtail/promtail.yml  # Mount the config file
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # Change host port if already bound locally (e.g., "8080:3000")
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started

volumes:
  prometheus_data:

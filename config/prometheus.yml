global:
  scrape_interval: 10s
  evaluation_interval: 10s # How often to check the rules

rule_files:
  - "alerts.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: [localhost:9093] 

scrape_configs:
  - job_name: 'sentinelsol_daemon'
    static_configs:
      - targets: ['extractor:8080']

  - job_name: 'jito_mock'
    static_configs:
      - targets: ['host.docker.internal:8081']
route:
  receiver: 'telegram_alert'
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: 'telegram'
    telegram_configs:
      - chat_id: ${TELEGRAM_CHAT_ID}
        bot_token: ${TELEGRAM_BOT_TOKEN}
        parse_mode: 'HTML'
        message: |-
          🚨 <b>{{ .GroupLabels.alertname }}</b> 🚨
          {{ range .Alerts }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          {{ end }}
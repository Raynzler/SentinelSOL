groups:
  - name: sentinelsol_predictive_alerts
    rules:
      # 1. Continuous Recording Rule: Track the absolute velocity of vote credits
      - record: instance:vote_velocity:rate1m
        expr: rate(sentinelsol_epoch_credits[1m])

      # 2. The Predictive Alert: Trigger if vote velocity falls 3 sigmas below the 1-hour norm
      - alert: TVCDegradation_Anomaly
        expr: >
          (
            instance:vote_velocity:rate1m 
            - avg_over_time(instance:vote_velocity:rate1m[1h])
          ) 
          / stddev_over_time(instance:vote_velocity:rate1m[1h]) < -3
        # Wait 2 minutes to ensure this isn't just a brief network stutter
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Consensus Degradation Detected on {{ $labels.instance }}"
          description: "Validator vote velocity has plummeted 3 standard deviations below its 1-hour baseline. The node is failing to participate in consensus."
groups:
  - name: sentinelsol_predictive_alerts
    rules:
      # 1. Continuous Recording Rule: Calculate the raw ratio every 15 seconds
      - record: instance:vote_efficiency:ratio
        expr: rate(sentinelsol_epoch_credits[1m]) / rate(sentinelsol_node_slot[1m])

      # 2. The Predictive Alert: Trigger if current performance is 3 standard deviations below the 1-hour norm
      - alert: TVCDegradation_Anomaly
        expr: >
          (
            instance:vote_efficiency:ratio 
            - avg_over_time(instance:vote_efficiency:ratio[1h])
          ) 
          / stddev_over_time(instance:vote_efficiency:ratio[1h]) < -3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Predictive Degradation Detected on {{ $labels.instance }}"
          description: "Validator efficiency has dropped 3 standard deviations below its 1-hour rolling baseline. Hardware failure or network exhaustion is imminent."